<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÈO MOBILE CONTROL</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --glass: rgba(255, 255, 255, 0.95); }
        body { 
            font-family: 'Quicksand', sans-serif; background: #fff0f3; 
            margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box;
        }
        .card { background: var(--glass); padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; }
        
        /* Login */
        #login-screen { flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .input-group { width: 100%; max-width: 300px; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; }
        .btn-main { width: 100%; padding: 15px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: bold; }

        /* Main View */
        #main-screen { display: none; flex-direction: column; height: 100%; }
        .clock { text-align: center; }
        #time { font-size: 24px; font-weight: 800; color: var(--pink); display: block; }
        #date { font-size: 12px; color: #666; }

        .chat-box { 
            flex: 1; display: flex; flex-direction: column; background: white; 
            border-radius: 20px; overflow: hidden; border: 1px solid #eee;
        }
        #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; font-size: 14px; }
        .msg { padding: 8px 0; border-bottom: 1px solid #f9f9f9; line-height: 1.4; }
        
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 5px; }
        .btn-opt { padding: 10px; border-radius: 10px; border: none; font-size: 12px; font-weight: bold; cursor: pointer; }
        .btn-mute { background: #333; color: white; }
        .btn-mute.active { background: var(--pink); }

        .speed-bar { font-size: 11px; margin-top: 10px; text-align: center; }
        input[type="range"] { width: 100%; accent-color: var(--pink); }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card input-group">
            <h3 style="text-align: center; margin-top: 0; color: var(--pink);">BÈO LIVE</h3>
            <input type="text" id="user" placeholder="@username_tiktok">
            <button class="btn-main" onclick="connect()">KẾT NỐI</button>
        </div>
    </div>

    <div id="main-screen">
        <div class="card clock">
            <span id="time">00:00:00</span>
            <span id="date">Đang tải...</span>
        </div>

        <div class="controls">
            <button class="btn-opt btn-mute active" id="muteBtn" onclick="toggleMute()">🔊 BẬT TIẾNG</button>
            <button class="btn-opt" style="background:#fff; border:1px solid #ddd" onclick="clearChat()">XOÁ CHAT</button>
        </div>

        <div class="chat-box" style="margin-top: 10px;">
            <div style="background: #f0f0f0; padding: 5px 15px; font-size: 11px; font-weight: bold;">BÌNH LUẬN TRỰC TIẾP</div>
            <div id="chat"></div>
        </div>

        <div class="speed-bar">
            TỐC ĐỘ ĐỌC: <span id="speedVal">1.0</span>x
            <input type="range" id="speechSpeed" min="0.5" max="2" step="0.1" value="1.0" oninput="document.getElementById('speedVal').innerText=this.value">
        </div>
    </div>

    <script>
        // Ép dùng websocket để không bị lag 502
        const socket = io({ transports: ['websocket'] });
        let queue = [], playing = false, muted = false;

        function connect() {
            const u = document.getElementById('user').value;
            if(u) {
                socket.emit('set-username', u);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
            }
        }

        function toggleMute() {
            muted = !muted;
            const btn = document.getElementById('muteBtn');
            btn.innerText = muted ? "🔇 TẮT TIẾNG" : "🔊 BẬT TIẾNG";
            btn.classList.toggle('active', !muted);
            if(muted) { queue = []; playing = false; }
        }

        function clearChat() { document.getElementById('chat').innerHTML = ''; }

        // Đồng hồ
        setInterval(() => {
            const n = new Date();
            document.getElementById('time').innerText = n.toLocaleTimeString('vi-VN');
            document.getElementById('date').innerText = n.toLocaleDateString('vi-VN', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'});
        }, 1000);

        socket.on('audio-data', d => {
            // Hiển thị chat
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b style="color:var(--pink)">${d.user}:</b> ${d.comment}`;
            chat.prepend(div);
            
            // Giới hạn 12 dòng hiển thị (cuộn bên trong)
            if(chat.childNodes.length > 50) chat.removeChild(chat.lastChild);

            // Xử lý giọng đọc
            if (d.audio && !muted) {
                queue.push(d.audio);
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length || muted) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = parseFloat(document.getElementById('speechSpeed').value);
            a.onended = () => setTimeout(play, 200);
            a.play().catch(() => play());
        }

        socket.on('status', s => console.log(s));
    </script>
</body>
</html>
