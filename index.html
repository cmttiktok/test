<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BÈO LIVE MOBILE</title>
    <script src="/socket.io/socket.io.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root { --pink: #fe2c55; --glass: rgba(255, 255, 255, 0.95); }
        body { font-family: 'Quicksand', sans-serif; background: #fff0f3; margin: 0; padding: 10px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }
        .card { background: var(--glass); padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; }
        
        #login-screen { flex:1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        input[type="text"] { width: 100%; padding: 15px; border-radius: 12px; border: 1px solid #ddd; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; outline: none; }
        .btn-main { width: 100%; padding: 15px; background: var(--pink); color: white; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; }

        #main-screen { display: none; flex-direction: column; height: 100%; }
        .clock { text-align: center; }
        #time { font-size: 26px; font-weight: 800; color: var(--pink); display: block; }
        #date { font-size: 13px; color: #666; }

        .chat-container { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 20px; overflow: hidden; border: 1px solid #eee; margin: 10px 0; }
        #chat { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column-reverse; }
        .msg { padding: 8px 0; border-bottom: 1px solid #f2f2f2; font-size: 14px; line-height: 1.4; }
        .msg b { color: var(--pink); }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-ctrl { padding: 12px; border-radius: 12px; border: none; font-weight: bold; font-family: 'Quicksand'; font-size: 13px; }
        .btn-mute { background: #333; color: white; }
        .btn-mute.on { background: var(--pink); }

        .speed-bar { padding: 10px 0; font-size: 12px; text-align: center; color: #444; }
        input[type="range"] { width: 100%; accent-color: var(--pink); margin-top: 5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="card" style="width: 100%; max-width: 300px;">
            <h2 style="text-align: center; color: var(--pink); margin-top: 0;">BÈO LIVE</h2>
            <input type="text" id="user" placeholder="Nhập ID TikTok...">
            <button class="btn-main" onclick="connect()">KẾT NỐI NGAY</button>
        </div>
    </div>

    <div id="main-screen">
        <div class="card clock">
            <span id="time">00:00:00</span>
            <span id="date">Đang tải...</span>
        </div>

        <div class="controls">
            <button class="btn-ctrl btn-mute on" id="muteBtn" onclick="toggleMute()">🔊 BẬT TIẾNG</button>
            <button class="btn-ctrl" style="background: #fff; border: 1px solid #ddd;" onclick="document.getElementById('chat').innerHTML=''">XOÁ CHAT</button>
        </div>

        <div class="chat-container">
            <div style="background: #f8f8f8; padding: 8px 15px; font-size: 11px; font-weight: bold; border-bottom: 1px solid #eee;">BÌNH LUẬN TRỰC TIẾP</div>
            <div id="chat"></div>
        </div>

        <div class="speed-bar">
            TỐC ĐỘ ĐỌC: <span id="speedVal">1.0</span>x
            <input type="range" id="speechSpeed" min="0.5" max="2.0" step="0.1" value="1.0" oninput="document.getElementById('speedVal').innerText=this.value">
        </div>
    </div>

    <script>
        // Cấu hình socket ưu tiên polling để tránh lỗi 502 trên Render
        const socket = io({ transports: ['polling', 'websocket'], upgrade: true });
        let queue = [], playing = false, muted = false;

        function connect() {
            const user = document.getElementById('user').value;
            if(user) {
                socket.emit('set-username', user);
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-screen').style.display = 'flex';
            }
        }

        function toggleMute() {
            muted = !muted;
            const btn = document.getElementById('muteBtn');
            btn.innerText = muted ? "🔇 TẮT TIẾNG" : "🔊 BẬT TIẾNG";
            btn.classList.toggle('on', !muted);
            if(muted) { queue = []; playing = false; }
        }

        // Đồng hồ thời gian thực
        setInterval(() => {
            const now = new Date();
            document.getElementById('time').innerText = now.toLocaleTimeString('vi-VN');
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', { weekday: 'long', day: 'numeric', month: 'numeric' });
        }, 1000);

        socket.on('audio-data', d => {
            const chat = document.getElementById('chat');
            const div = document.createElement('div');
            div.className = 'msg';
            div.innerHTML = `<b>${d.user}:</b> ${d.comment}`;
            chat.prepend(div);

            // Giới hạn hiển thị 12-15 dòng cho nhẹ máy
            if(chat.childNodes.length > 30) chat.removeChild(chat.lastChild);

            if (d.audio && !muted) {
                queue.push(d.audio);
                if (!playing) play();
            }
        });

        function play() {
            if (!queue.length || muted) { playing = false; return; }
            playing = true;
            const a = new Audio(queue.shift());
            a.playbackRate = parseFloat(document.getElementById('speechSpeed').value);
            a.onended = () => setTimeout(play, 200);
            a.play().catch(() => play());
        }

        socket.on('status', s => console.log(s));
    </script>
</body>
</html>
